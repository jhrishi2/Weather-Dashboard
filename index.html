<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Weather Station</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; 
      padding: 20px; 
      background: #0a0f1c; 
      color: #e2e8f0; 
    }
    .container { max-width: 1000px; margin: auto; }
    h2 { color: #60a5fa; margin-bottom: 10px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; }
    
    .temp-main { font-size: 4.5rem; font-weight: bold; }
    .max-min { display: flex; gap: 40px; margin-top: 10px; }
    .value { font-size: 2.8rem; font-weight: bold; }
    
    .card { 
      background: #111827; 
      padding: 25px; 
      border-radius: 20px; 
      margin: 20px 0; 
    }
    .row { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
    .item { flex: 1; min-width: 200px; }
    
    .rain-big { font-size: 4rem; font-weight: bold; color: #67e8f9; }
  </style>
</head>
<body>
  <div class="container">

    <!-- Temperature -->
    <div class="card">
      <h2>TEMPERATURE</h2>
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div id="temp" class="temp-main">--°C</div>
        </div>
        <div>
          <div style="color:#ef4444;">● MAX <span id="tempmax">--°C</span></div>
          <div style="color:#3b82f6;">● MIN <span id="tempmin">--°C</span></div>
        </div>
      </div>
      <div>Feels Like: <span id="feelslike">--°C</span></div>
    </div>

    <!-- Wind -->
    <div class="card">
      <h2>WIND VECTOR</h2>
      <div id="wind" class="value">-- km/h</div>
      <div id="winddir" style="font-size:1.3rem;">--</div>
      <div>Gusting to: <span id="gust">-- km/h</span></div>
    </div>

    <!-- Rainfall -->
    <div class="card">
      <h2>RAINFALL</h2>
      <div style="display:flex; justify-content:space-between;">
        <div>
          <div class="rain-big" id="totalrain">-- mm</div>
        </div>
        <div>
          <div>Current
