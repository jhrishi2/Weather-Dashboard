<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Weather Station</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      margin: 0; padding: 20px; 
      background: linear-gradient(135deg, #0f172a, #1e2937); 
      color: #e2e8f0; 
    }
    .container { max-width: 1000px; margin: auto; }
    .card { 
      background: rgba(30, 41, 55, 0.95); 
      padding: 20px; 
      border-radius: 16px; 
      margin: 15px 0; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    h1 { text-align: center; color: #67e8f9; }
    .big-number { font-size: 3.8rem; font-weight: bold; margin: 5px 0; }
    .section { margin: 30px 0; }
    .row { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
    .item { flex: 1; min-width: 280px; }
    .rr { color: #22d3ee; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌧️ My Personal Weather Station</h1>

    <div class="section">
      <div class="row">
        <!-- Temperature Card -->
        <div class="card item">
          <h2>TEMPERATURE</h2>
          <div id="temp" class="big-number">--°C</div>
          <div>Feels Like: <span id="feelslike">--°C</span></div>
        </div>

        <!-- Wind Card -->
        <div class="card item">
          <h2>WIND</h2>
          <div id="wind" class="big-number">-- km/h</div>
          <div id="winddir">--</div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="row">
        <!-- Rainfall Card -->
        <div class="card item">
          <h2>RAINFALL</h2>
          <div id="totalrain" class="big-number">-- mm</div>
          <div class="rr">
            Current RR: <span id="current-rr" class="big-number" style="font-size:2.5rem;">-- mm/h</span>
          </div>
          <div>Davis-style Instant RR: <span id="davis-rr" class="big-number" style="font-size:2.2rem;color:#67e8f9;">-- mm/h</span></div>
        </div>

        <!-- Humidity & Others -->
        <div class="card item">
          <h2>OTHER</h2>
          <div>Humidity: <span id="humidity">-- %</span></div>
          <div>Pressure: <span id="pressure">-- hPa</span></div>
        </div>
      </div>
    </div>

    <button onclick="fetchData()" style="display:block;margin:20px auto;padding:15px 30px;font-size:1.1rem;">🔄 Refresh Data</button>
  </div>

  <script>
    const API_KEY = '4300811983344786a59530f53647923c9a5a5141ea0348f59eb5ca3694dc10dc';
    const APP_KEY = '550017c1906c44da8ff6460bc99c29a700c6c4ede4ce4475a1a1d19c023a4e92';
    const MAC = 'BC:FF:4D:81:C0:2C';

    let lastRain = null;
    let lastTime = null;

    async function fetchData() {
      try {
        const res = await fetch(`https://api.ambientweather.net/v1/devices/${MAC}?apiKey=${API_KEY}&applicationKey=${APP_KEY}`);
        const data = await res.json();
        const d = data[0];

        // Fill the dashboard
        document.getElementById('temp').innerText = (d.tempf ? ((d.tempf - 32) * 5/9).toFixed(1) : '--') + '°C';
        document.getElementById('feelslike').innerText = (d.feelsLike ? ((d.feelsLike - 32) * 5/9).toFixed(1) : '--') + '°C';
        document.getElementById('wind').innerText = (d.windspeedmph ? (d.windspeedmph * 1.60934).toFixed(1) : '--') + ' km/h';
        document.getElementById('winddir').innerText = (d.winddir || '--') + '°';
        document.getElementById('humidity').innerText = d.humidity || '--';
        document.getElementById('pressure').innerText = d.baromrelin || '--';
        document.getElementById('totalrain').innerText = (d.hourlyrainin || d.dailyrainin || 0).toFixed(1) + ' mm';

        // Ambient RR
        document.getElementById('current-rr').innerText = (d.rainRate || 0).toFixed(1) + ' mm/h';

        // Davis-style Instant RR
        const now = Date.now();
        const currentRain = d.hourlyrainin || 0;

        if (lastRain !== null && lastTime !== null) {
          const rainDelta = currentRain - lastRain;
          const minutesDelta = (now - lastTime) / (1000 * 60);
          let customRR = 0;
          if (minutesDelta > 0 && rainDelta > 0) {
            customRR = (rainDelta / minutesDelta) * 60;
          }
          document.getElementById('davis-rr').innerText = customRR.toFixed(1) + ' mm/h';
        }

        lastRain = currentRain;
        lastTime = now;

      } catch (e) {
        console.error(e);
      }
    }

    setInterval(fetchData, 60000);
    fetchData();
  </script>
</body>
</html>
