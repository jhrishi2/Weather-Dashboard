<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Ambient Weather Station</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #0f172a; color: #e2e8f0; }
    .container { max-width: 1100px; margin: auto; }
    h1 { text-align: center; color: #67e8f9; }
    .card { background: #1e2937; padding: 20px; border-radius: 16px; margin: 15px 0; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    .big { font-size: 3.2rem; font-weight: bold; margin: 8px 0; }
    .row { display: flex; flex-wrap: wrap; gap: 15px; }
    .item { flex: 1; min-width: 300px; }
    .label { color: #94a3b8; font-size: 0.95rem; }
    button { padding: 12px 30px; background: #22d3ee; color: #000; border: none; border-radius: 8px; font-size: 1.1rem; cursor: pointer; display: block; margin: 20px auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌧️ My Ambient Weather Station</h1>

    <div class="row">
      <!-- Temperature -->
      <div class="card item">
        <h2>TEMPERATURE</h2>
        <div id="temp" class="big">--°C</div>
        <div>Feels Like: <span id="feelslike">--°C</span></div>
        <div>Max: <span id="tempmax">--°C</span> | Min: <span id="tempmin">--°C</span></div>
      </div>

      <!-- Humidity & Pressure -->
      <div class="card item">
        <h2>HUMIDITY & PRESSURE</h2>
        <div>Humidity: <span id="humidity" class="big">--%</span></div>
        <div>Pressure: <span id="pressure">-- hPa</span></div>
        <div>Dew Point: <span id="dewpoint">--°C</span></div>
      </div>
    </div>

    <div class="row">
      <!-- Wind -->
      <div class="card item">
        <h2>WIND</h2>
        <div id="windspeed" class="big">-- km/h</div>
        <div id="winddirtext">--</div>
        <div>Gust: <span id="gust">-- km/h</span></div>
      </div>

      <!-- Rainfall (Main Focus) -->
      <div class="card item">
        <h2>RAINFALL</h2>
        <div>Total Today: <span id="totalrain" class="big">-- mm</span></div>
        
        <div style="margin-top:15px;">
          <span class="label">Ambient Rain Rate</span><br>
          <span id="ambient-rr" class="big" style="color:#f87171;">-- mm/h</span>
        </div>
        
        <div style="margin-top:15px;">
          <span class="label">🟢 Davis-style Instant RR</span><br>
          <span id="davis-rr" class="big" style="color:#67e8f9;">-- mm/h</span>
        </div>
      </div>
    </div>

    <button onclick="fetchData()">🔄 Refresh All Data Now</button>
  </div>

  <script>
    const API_KEY = '4300811983344786a59530f53647923c9a5a5141ea0348f59eb5ca3694dc10dc';
    const APP_KEY = '550017c1906c44da8ff6460bc99c29a700c6c4ede4ce4475a1a1d19c023a4e92';
    const MAC = 'BC:FF:4D:81:C0:2C';

    let lastRain = null;
    let lastTime = null;

    async function fetchData() {
      try {
        const res = await fetch(`https://api.ambientweather.net/v1/devices/${MAC}?apiKey=${API_KEY}&applicationKey=${APP_KEY}`);
        const data = await res.json();
        const d = data[0];

        // Temperature (convert F to C)
        document.getElementById('temp').innerText = d.tempf ? ((d.tempf - 32) * 5/9).toFixed(1) + '°C' : '--';
        document.getElementById('feelslike').innerText = d.feelsLike ? ((d.feelsLike - 32) * 5/9).toFixed(1) + '°C' : '--';
        document.getElementById('tempmax').innerText = d.maxtempf ? ((d.maxtempf - 32) * 5/9).toFixed(1) : '--';
        document.getElementById('tempmin').innerText = d.mintempf ? ((d.mintempf - 32) * 5/9).toFixed(1) : '--';

        document.getElementById('humidity').innerText = d.humidity || '--';
        document.getElementById('pressure').innerText = d.baromrelin || '--';
        document.getElementById('dewpoint').innerText = d.dewptf ? ((d.dewptf - 32) * 5/9).toFixed(1) : '--';

        // Wind
        document.getElementById('windspeed').innerText = d.windspeedmph ? (d.windspeedmph * 1.60934).toFixed(1) + ' km/h' : '--';
        document.getElementById('winddirtext').innerText = d.winddir ? d.winddir + '°' : '--';
        document.getElementById('gust').innerText = d.windgustmph ? (d.windgustmph * 1.60934).toFixed(1) + ' km/h' : '--';

        // Rainfall
        document.getElementById('totalrain').innerText = (d.dailyrainin || 0).toFixed(1) + ' mm';
        document.getElementById('ambient-rr').innerText = (d.rainRate || 0).toFixed(1) + ' mm/h';

        // Davis-style Instant RR
        const now = Date.now();
        const currentRain = d.hourlyrainin || 0;
        if (lastRain !== null && lastTime !== null) {
          const delta = currentRain - lastRain;
          const minDelta = (now - lastTime) / (1000 * 60);
          let custom = 0;
          if (minDelta > 0 && delta > 0) custom = (delta / minDelta) * 60;
          document.getElementById('davis-rr').innerText = custom.toFixed(1) + ' mm/h';
        }
        lastRain = currentRain;
        lastTime = now;

      } catch (e) {
        console.error(e);
      }
    }

    setInterval(fetchData, 60000);
    fetchData();
  </script>
</body>
</html>
